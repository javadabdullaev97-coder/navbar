name: Supabase RLS isolation test

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-rls-test.yml"
  pull_request:
    paths:
      - "supabase/**"
  workflow_dispatch:

jobs:
  isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
          echo "/usr/lib/postgresql/$(ls /usr/lib/postgresql | sort -V | tail -1)/bin" >> "$GITHUB_PATH"
      - name: Run isolation test
        run: bash supabase/tests/run_isolation_test.sh
